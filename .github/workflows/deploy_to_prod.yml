name: 🚀 Deploy BQ SQL → GCS Production Bucket

on:
  push:
    branches:
      - main
    paths:
      - 'bqsql_converted/**'
  pull_request:
    branches:
      - main
    paths:
      - 'bqsql_converted/**'

env:
  GCS_PROD_BUCKET: ${{ secrets.GCS_PROD_BUCKET }}
  GCP_PROJECT_ID:  ${{ secrets.GCP_PROJECT_ID }}

jobs:

  # ─── Job 1: Validate SQL Syntax ─────────────────────────────────────────
  validate:
    name: ✅ Validate BigQuery SQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validate SQL files (dry-run)
        run: |
          echo "🔍 Running BigQuery SQL dry-run validation..."
          FAILED=0
          for file in bqsql_converted/*.sql; do
            echo -n "  Checking: $file ... "
            if bq query \
                --project_id="${{ env.GCP_PROJECT_ID }}" \
                --dry_run \
                --use_legacy_sql=false \
                --format=none \
                "$(cat $file)" 2>/dev/null; then
              echo "✅ OK"
            else
              echo "❌ FAILED"
              FAILED=$((FAILED+1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED SQL file(s) failed validation. Blocking deployment."
            exit 1
          fi

          echo "✅ All SQL files passed validation."

  # ─── Job 2: Deploy to GCS Production Bucket ─────────────────────────────
  deploy:
    name: 🚢 Deploy to GCS
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Create versioned deployment folder
        id: deploy_folder
        run: |
          DEPLOY_TS=$(date +%Y%m%d_%H%M%S)
          SHORT_SHA="${GITHUB_SHA::7}"
          DEPLOY_PATH="bqsql/deploy_${DEPLOY_TS}_${SHORT_SHA}"
          echo "deploy_path=${DEPLOY_PATH}" >> $GITHUB_OUTPUT
          echo "📦 Deploying to: gs://${{ env.GCS_PROD_BUCKET }}/${DEPLOY_PATH}"

      - name: Upload SQL files to GCS
        run: |
          gsutil -m cp -r bqsql_converted/*.sql \
            "gs://${{ env.GCS_PROD_BUCKET }}/${{ steps.deploy_folder.outputs.deploy_path }}/"

      - name: Update latest symlink manifest
        run: |
          echo "${{ steps.deploy_folder.outputs.deploy_path }}" \
            | gsutil cp - "gs://${{ env.GCS_PROD_BUCKET }}/bqsql/LATEST"

      - name: Deployment summary
        run: |
          echo "========================================"
          echo "  ✅ DEPLOYMENT SUCCESSFUL"
          echo "  Commit    : $GITHUB_SHA"
          echo "  Branch    : $GITHUB_REF_NAME"
          echo "  GCS Path  : gs://${{ env.GCS_PROD_BUCKET }}/${{ steps.deploy_folder.outputs.deploy_path }}"
          echo "  Files     : $(ls bqsql_converted/*.sql | wc -l) SQL files deployed"
          echo "========================================"
